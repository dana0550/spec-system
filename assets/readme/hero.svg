<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">docs-spec-system Hero</title>
  <desc id="desc">AI-inspired system map blended with a wrapped package motif as a nod to wrapper design craft.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071426"/>
      <stop offset="0.55" stop-color="#0F2F43"/>
      <stop offset="1" stop-color="#1B5A52"/>
    </linearGradient>

    <linearGradient id="grid" x1="140" y1="70" x2="1140" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6DF2D2" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#F5D98A" stop-opacity="0.24"/>
    </linearGradient>

    <linearGradient id="ribbon" x1="770" y1="180" x2="1100" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7CF4DA"/>
      <stop offset="1" stop-color="#F1D288"/>
    </linearGradient>

    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1020 150) rotate(90) scale(240 360)">
      <stop stop-color="#8AF8DF" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#8AF8DF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(200 560) rotate(90) scale(220 340)">
      <stop stop-color="#F4C87A" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#F4C87A" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glowA)"/>
  <rect width="1280" height="640" fill="url(#glowB)"/>

  <g opacity="0.12">
    <path d="M0 462C140 436 287 429 430 441C590 455 738 503 887 512C1027 521 1161 506 1280 474" stroke="#9DE8D4" stroke-width="2"/>
    <path d="M0 512C142 488 281 486 412 500C571 518 726 565 872 576C1008 586 1148 572 1280 548" stroke="#9DE8D4" stroke-width="2"/>
    <path d="M0 404C153 378 302 372 452 386C606 401 758 448 900 460C1034 471 1157 455 1280 428" stroke="#9DE8D4" stroke-width="2"/>
  </g>

  <g filter="url(#softGlow)" opacity="0.45">
    <circle cx="1040" cy="126" r="58" fill="#85F9E1"/>
    <circle cx="186" cy="570" r="76" fill="#F4C87A"/>
  </g>

  <rect x="78" y="98" width="118" height="30" rx="15" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.25)"/>
  <text x="137" y="118" text-anchor="middle" fill="#E8FFF8" font-size="14" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" letter-spacing="1.4">v2.4</text>

  <text x="78" y="222" fill="#F3FAF8" font-size="68" font-weight="700" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif">docs-spec-system</text>
  <text x="78" y="280" fill="#B4DCD2" font-size="27" font-weight="500" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif">Contract-first specs for long-horizon AI software delivery.</text>

  <text x="78" y="340" fill="#DBF2EC" font-size="19" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif">Deterministic traceability, phase-gated approvals, and one-shot execution for epics.</text>
  <text x="78" y="372" fill="#DBF2EC" font-size="19" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif">A modern systems workflow with a subtle nod to wrapper design craft.</text>

  <g>
    <rect x="78" y="448" width="182" height="46" rx="23" fill="rgba(109,242,210,0.16)" stroke="#6DF2D2"/>
    <text x="169" y="477" text-anchor="middle" fill="#DEFFF6" font-size="16" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif">EARS + RFC</text>

    <rect x="276" y="448" width="238" height="46" rx="23" fill="rgba(245,217,138,0.16)" stroke="#F5D98A"/>
    <text x="395" y="477" text-anchor="middle" fill="#FFF8DF" font-size="16" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif">R -> D -> T -> S -> Evidence</text>

    <rect x="530" y="448" width="194" height="46" rx="23" fill="rgba(109,242,210,0.16)" stroke="#6DF2D2"/>
    <text x="627" y="477" text-anchor="middle" fill="#DEFFF6" font-size="16" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif">Codex + Claude</text>
  </g>

