    <path d="M952 224V420" stroke="#8BF6DE" stroke-width="2"/>
    <path d="M902 190L1002 254" stroke="#F5D98A" stroke-width="1.7"/>

    <path d="M770 236L940 334L1140 258" stroke="rgba(255,255,255,0.22)" stroke-width="1.6"/>
    <path d="M770 285L940 385L1140 310" stroke="rgba(255,255,255,0.18)" stroke-width="1.4"/>
    <path d="M770 334L940 436L1140 360" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>
  </g>

