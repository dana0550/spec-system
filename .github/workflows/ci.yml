name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          pip install -e .
          pip install pytest

      - name: Lint fixture docs
        run: python -m specctl.cli lint --root tests/fixtures/v2_docs

      - name: Render check fixture docs
        run: |
          python -m specctl.cli render --root tests/fixtures/v2_docs
          python -m specctl.cli render --root tests/fixtures/v2_docs --check

      - name: Check fixture docs
        run: python -m specctl.cli check --root tests/fixtures/v2_docs

      - name: Impact scan fixture docs
        run: |
          python -m specctl.cli impact refresh --root tests/fixtures/v2_docs
          python -m specctl.cli impact scan --root tests/fixtures/v2_docs

      - name: Smoke generated workspace
        run: |
          tmpdir="$(mktemp -d)"
          python -m specctl.cli init --root "$tmpdir"
          python -m specctl.cli feature create --root "$tmpdir" --name "SmokeFeature" --owner smoke@example.com
          python -m specctl.cli impact refresh --root "$tmpdir"
          python -m specctl.cli approve --root "$tmpdir" --feature-id F-001 --phase requirements
          python -m specctl.cli approve --root "$tmpdir" --feature-id F-001 --phase design
          python -m specctl.cli approve --root "$tmpdir" --feature-id F-001 --phase tasks
          python -m specctl.cli impact scan --root "$tmpdir"
          python -m specctl.cli render --root "$tmpdir"
          python -m specctl.cli check --root "$tmpdir"

      - name: Migration smoke
        run: |
          tmpdir="$(mktemp -d)"
          cp -R tests/fixtures/v1_docs/. "$tmpdir"
          python -m specctl.cli migrate-v1-to-v2 --root "$tmpdir"
          python -m specctl.cli check --root "$tmpdir"

      - name: Run tests
        run: python -m pytest
