name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: Lint fixture docs
        run: python -m specctl.cli lint --root tests/fixtures/v2_docs

      - name: Render check fixture docs
        run: |
          python -m specctl.cli render --root tests/fixtures/v2_docs
          python -m specctl.cli render --root tests/fixtures/v2_docs --check

      - name: Check fixture docs
        run: python -m specctl.cli check --root tests/fixtures/v2_docs

      - name: Run tests
        run: python -m pytest
