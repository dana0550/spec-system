name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main --depth=1
          tag_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          if ! git merge-base --is-ancestor "$tag_commit" "origin/main"; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not based on origin/main."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: Verify tag matches pyproject version
        run: |
          expected_tag="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print("v" + data["project"]["version"])
          PY
          )"
          if [ "$expected_tag" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match pyproject version ${expected_tag}."
            exit 1
          fi

      - name: Lint fixture docs
        run: python -m specctl.cli lint --root tests/fixtures/v2_docs

      - name: Render check fixture docs
        run: |
          python -m specctl.cli render --root tests/fixtures/v2_docs
          python -m specctl.cli render --root tests/fixtures/v2_docs --check

      - name: Check fixture docs
        run: python -m specctl.cli check --root tests/fixtures/v2_docs

      - name: Run tests
        run: python -m pytest

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: docs-spec-system ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Upgrade
            1. Run `specctl migrate-v1-to-v2`.
            2. Run `specctl check`.
            3. Resolve all blocking `ERROR` entries before shipping.
